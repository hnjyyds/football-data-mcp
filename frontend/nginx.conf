map $sent_http_content_type $cache_control_header {
  default                          "no-store";
  ~^application/javascript         "public, max-age=31536000, immutable";
  ~^text/css                       "public, max-age=31536000, immutable";
  ~^image/                         "public, max-age=2592000";
  ~^font/                          "public, max-age=31536000, immutable";
  ~^application/font               "public, max-age=31536000, immutable";
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers ────────────────────────────────────────────────────────
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

  # ── Compression ─────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/wasm
    image/svg+xml;

  # ── Per-route caching policy ────────────────────────────────────────────────
  # Hashed assets: cache forever
  location ^~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # API proxy: never cache; align timeouts with frontend (30s)
  location /api/ {
    proxy_pass http://football-data-mcp:8910/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    add_header Cache-Control "no-store" always;
  }

  # Healthcheck endpoint — proxies through to backend so the dashboard pod is
  # only "healthy" when it can actually reach the MCP service.
  location = /healthz {
    access_log off;
    proxy_pass http://football-data-mcp:8910/api/dashboard;
    proxy_connect_timeout 3s;
    proxy_send_timeout 3s;
    proxy_read_timeout 5s;
    proxy_intercept_errors on;
    error_page 502 503 504 = @unhealthy;
  }
  location @unhealthy {
    return 503 "backend unreachable\n";
  }

  # SPA shell fallback
  location / {
    add_header Cache-Control "no-store" always;
    try_files $uri $uri/ /index.html;
  }
}
