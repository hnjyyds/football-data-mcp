services:
  football-data-mcp:
    build: .
    image: football-data-mcp:local
    container_name: football-data-mcp
    ports:
      - "8910:8910"
    environment:
      FOOTBALL_DATA_MCP_HOST: "0.0.0.0"
      FOOTBALL_DATA_MCP_PORT: "8910"
      FOOTBALL_DATA_MCP_TRANSPORT: "streamable-http"
      FOOTBALL_DATA_DASHBOARD_CORS_ORIGINS: "${FOOTBALL_DATA_DASHBOARD_CORS_ORIGINS:-http://localhost:8920,http://127.0.0.1:8920}"
      FOOTBALL_DATA_ADMIN_TOKEN: "${FOOTBALL_DATA_ADMIN_TOKEN:-}"
      FOOTBALL_DATA_CACHE_SECONDS: "300"
      FOOTBALL_DATA_SNAPSHOT_DB: "/data/football_data_mcp_snapshots.sqlite3"
      FOOTBALL_DATA_LEARNING_DB: "/data/football_data_mcp_learning.sqlite3"
      FOOTBALL_DATA_AUTO_LEARNING_ENABLED: "${FOOTBALL_DATA_AUTO_LEARNING_ENABLED:-true}"
      FOOTBALL_DATA_AUTO_LEARNING_INTERVAL_SECONDS: "${FOOTBALL_DATA_AUTO_LEARNING_INTERVAL_SECONDS:-120}"
      FOOTBALL_DATA_AUTO_LEARNING_CYCLE_TIMEOUT_SECONDS: "${FOOTBALL_DATA_AUTO_LEARNING_CYCLE_TIMEOUT_SECONDS:-300}"
      FOOTBALL_DATA_AUTO_LEARNING_TOP_N: "${FOOTBALL_DATA_AUTO_LEARNING_TOP_N:-12}"
      FOOTBALL_DATA_AUTO_LEARNING_LIMIT: "${FOOTBALL_DATA_AUTO_LEARNING_LIMIT:-80}"
      FOOTBALL_DATA_AUTO_LEARNING_TIMEZONE: "${FOOTBALL_DATA_AUTO_LEARNING_TIMEZONE:-Asia/Shanghai}"
      # 只把近开赛预测持久化为学习样本；盘口快照另走 24h 窗口积累时间序列。
      FOOTBALL_DATA_AUTO_LEARNING_ASIAN_WINDOW_MINUTES: "${FOOTBALL_DATA_AUTO_LEARNING_ASIAN_WINDOW_MINUTES:-10}"
      FOOTBALL_DATA_AUTO_LEARNING_PARLAY_WINDOW_MINUTES: "${FOOTBALL_DATA_AUTO_LEARNING_PARLAY_WINDOW_MINUTES:-10}"
      FOOTBALL_DATA_AUTO_LEARNING_OBSERVATION_LIMIT: "${FOOTBALL_DATA_AUTO_LEARNING_OBSERVATION_LIMIT:-30}"
      FOOTBALL_DATA_AUTO_LEARNING_ANALYSIS_CANDIDATE_LIMIT: "${FOOTBALL_DATA_AUTO_LEARNING_ANALYSIS_CANDIDATE_LIMIT:-80}"
      FOOTBALL_DATA_AUTO_LEARNING_ANALYSIS_CONCURRENCY: "${FOOTBALL_DATA_AUTO_LEARNING_ANALYSIS_CONCURRENCY:-10}"
      FOOTBALL_DATA_AUTO_LEARNING_ANALYSIS_TIMEOUT_SECONDS: "${FOOTBALL_DATA_AUTO_LEARNING_ANALYSIS_TIMEOUT_SECONDS:-45}"
      FOOTBALL_DATA_AUTO_LEARNING_SHADOW_PREDICTION_LIMIT: "${FOOTBALL_DATA_AUTO_LEARNING_SHADOW_PREDICTION_LIMIT:-100}"
      FOOTBALL_DATA_AUTO_SYNC_LEISU_ODDS: "${FOOTBALL_DATA_AUTO_SYNC_LEISU_ODDS:-false}"
      FOOTBALL_DATA_AUTO_LEARNING_SNAPSHOT_WINDOW_MINUTES: "${FOOTBALL_DATA_AUTO_LEARNING_SNAPSHOT_WINDOW_MINUTES:-1440}"
      FOOTBALL_DATA_AUTO_LEARNING_SNAPSHOT_LIMIT: "${FOOTBALL_DATA_AUTO_LEARNING_SNAPSHOT_LIMIT:-80}"
      FOOTBALL_DATA_AUTO_LEARNING_SNAPSHOT_CONCURRENCY: "${FOOTBALL_DATA_AUTO_LEARNING_SNAPSHOT_CONCURRENCY:-4}"
      FOOTBALL_DATA_AUTO_LEARNING_SNAPSHOT_REQUIRE_QUALITY_GATE: "${FOOTBALL_DATA_AUTO_LEARNING_SNAPSHOT_REQUIRE_QUALITY_GATE:-true}"
      FOOTBALL_DATA_AUTO_LEARNING_SNAPSHOT_REANALYSIS: "${FOOTBALL_DATA_AUTO_LEARNING_SNAPSHOT_REANALYSIS:-true}"
      FOOTBALL_DATA_AUTO_LEARNING_REANALYSIS_LIMIT: "${FOOTBALL_DATA_AUTO_LEARNING_REANALYSIS_LIMIT:-20}"
      FOOTBALL_DATA_AUTO_LEARNING_REANALYSIS_CONCURRENCY: "${FOOTBALL_DATA_AUTO_LEARNING_REANALYSIS_CONCURRENCY:-4}"
      FOOTBALL_DATA_FREE_SOURCE_TIMEOUT: "${FOOTBALL_DATA_FREE_SOURCE_TIMEOUT:-2.0}"
      SPORTTERY_PROXY_URL: "${SPORTTERY_PROXY_URL:-http://host.docker.internal:8919/sporttery/match-list}"
      THE_ODDS_API_KEY: "${THE_ODDS_API_KEY:-}"
      FOOTBALL_DATA_ORG_TOKEN: "${FOOTBALL_DATA_ORG_TOKEN:-}"
      THE_ODDS_API_REGIONS: "${THE_ODDS_API_REGIONS:-uk,eu,us}"
      THE_ODDS_API_SPORT_KEYS: "${THE_ODDS_API_SPORT_KEYS:-}"
      SPORTMONKS_API_TOKEN: "${SPORTMONKS_API_TOKEN:-}"
      API_FOOTBALL_KEY: "${API_FOOTBALL_KEY:-}"
      LEISU_ODDS_PROXY_URL: "${LEISU_ODDS_PROXY_URL:-}"
      LEISU_COOKIE: "${LEISU_COOKIE:-}"
      LEISU_ACW_SC_V2: "${LEISU_ACW_SC_V2:-}"
      LEISU_PROXY_SYNC_LIMIT: "${LEISU_PROXY_SYNC_LIMIT:-12}"
      LEISU_PROXY_REQUEST_SPACING_SECONDS: "${LEISU_PROXY_REQUEST_SPACING_SECONDS:-2.0}"
      LEISU_MOBILE_API_ENABLED: "${LEISU_MOBILE_API_ENABLED:-true}"
      FOOTBALL_DATA_LEISU_CONTEXT_ENABLED: "${FOOTBALL_DATA_LEISU_CONTEXT_ENABLED:-true}"
      LEISU_MOBILE_DETAIL_COMPANY_LIMIT: "${LEISU_MOBILE_DETAIL_COMPANY_LIMIT:-3}"
    volumes:
      - football-data-mcp-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8910/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  football-data-dashboard:
    build:
      context: ./frontend
    image: football-data-dashboard:local
    container_name: football-data-dashboard
    depends_on:
      football-data-mcp:
        condition: service_healthy
    ports:
      - "8920:80"
    restart: unless-stopped

volumes:
  football-data-mcp-data:
